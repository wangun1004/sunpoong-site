<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 – 선풍건설산업</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { background: #fff; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,.4); }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon { width: 64px; height: 64px; background: #1a2f5e; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; font-weight: 900; margin: 0 auto 12px; }
    .logo h1 { font-size: 20px; font-weight: 900; color: #1a2f5e; }
    .logo p { font-size: 13px; color: #64748b; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-group input { width: 100%; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; font-size: 14px; font-family: inherit; transition: border-color .2s; }
    .form-group input:focus { outline: none; border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.15); }
    .btn-login { width: 100%; background: #1a2f5e; color: #fff; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .2s; margin-top: 8px; }
    .btn-login:hover { background: #253d7f; }
    .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }
    .error-msg { background: #fee2e2; color: #b91c1c; border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: none; }
    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #64748b; }
    .back-link a { color: #1a2f5e; font-weight: 600; }
    .dev-hint { background: #f0fdf4; border: 1px solid #86efac; border-radius: 10px; padding: 12px 16px; font-size: 12px; color: #166534; margin-bottom: 20px; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">SP</div>
    <h1>선풍건설산업</h1>
    <p>관리자 로그인</p>
  </div>

  <div class="dev-hint" id="devHint">
    🔧 <strong>개발 모드:</strong> Supabase 미연결 시<br>
    이메일: <code>admin@sunpoong.co.kr</code> / 비밀번호: <code>admin1234</code>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="email" value="admin@sunpoong.co.kr" required>
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="password" required>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">로그인</button>
  </form>

  <div class="back-link">
    <a href="../index.html">← 홈페이지로 돌아가기</a>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/db.js"></script>
<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('errorMsg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 로그인 중...';
  errEl.style.display = 'none';

  try {
    await adminLogin(
      document.getElementById('email').value,
      document.getElementById('password').value
    );
    const params = new URLSearchParams(location.search);
    const redirect = params.get('redirect');
    location.href = redirect || 'dashboard.html';
  } catch(err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '로그인';
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 대시보드 – 선풍건설산업</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#1a2f5e; --green:#22c55e; --green2:#16a34a; --gray:#64748b; --border:#e2e8f0; --light:#f8fafc; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--light); color: #222; display: flex; min-height: 100vh; }

    /* 사이드바 */
    .sidebar { width: 240px; background: var(--navy); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar-logo .sp { font-size: 22px; font-weight: 900; color: var(--green); }
    .sidebar-logo .title { font-size: 13px; color: #94a3b8; margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 16px 0; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; font-size: 14px; color: #94a3b8; cursor: pointer; transition: .2s; border: none; background: none; width: 100%; text-align: left; font-family: inherit; }
    .nav-item:hover, .nav-item.active { background: rgba(255,255,255,.08); color: #fff; }
    .nav-item.active { border-left: 3px solid var(--green); }
    .nav-item .icon { font-size: 18px; flex-shrink: 0; }
    .nav-section { padding: 12px 20px 4px; font-size: 11px; font-weight: 700; color: #475569; letter-spacing: 1px; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.1); }
    .btn-logout { width: 100%; background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: .2s; }
    .btn-logout:hover { background: rgba(239,68,68,.25); }

    /* 메인 */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 20px; font-weight: 800; color: var(--navy); }
    .topbar .meta { font-size: 13px; color: var(--gray); }
    .content { flex: 1; padding: 32px; overflow-y: auto; }

    /* 패널 */
    .panel { display: none; }
    .panel.active { display: block; }

    /* 통계 카드 */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .stat-card .label { font-size: 13px; color: var(--gray); margin-bottom: 8px; }
    .stat-card .num { font-size: 36px; font-weight: 900; color: var(--navy); }
    .stat-card .sub { font-size: 12px; color: var(--gray); margin-top: 4px; }
    .stat-card.green .num { color: var(--green2); }
    .stat-card.orange .num { color: #ea580c; }

    /* 테이블 공통 */
    .card { background: #fff; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden; }
    .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .card-header h2 { font-size: 16px; font-weight: 800; color: var(--navy); }
    .card-body { padding: 0; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--light); padding: 12px 16px; font-size: 13px; font-weight: 700; color: var(--gray); text-align: left; border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    /* 필터/검색 바 */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-bar input, .filter-bar select { border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: inherit; }
    .filter-bar input:focus, .filter-bar select:focus { outline: none; border-color: var(--green); }
    .filter-bar button { background: var(--navy); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }

    /* 배지 */
    .tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .tag-green { background: #dcfce7; color: var(--green2); }
    .tag-yellow { background: #fef9c3; color: #a16207; }
    .tag-red { background: #fee2e2; color: #b91c1c; }
    .tag-blue { background: #dbeafe; color: #1d4ed8; }
    .tag-gray { background: #f1f5f9; color: var(--gray); }

    /* 액션 버튼 */
    .btn-sm { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; border: 1px solid transparent; transition: .15s; }
    .btn-primary { background: var(--navy); color: #fff; }
    .btn-primary:hover { background: #253d7f; }
    .btn-danger { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
    .btn-danger:hover { background: #fecaca; }
    .btn-success { background: #dcfce7; color: var(--green2); border-color: #86efac; }
    .btn-new { background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }

    /* 모달 */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 24px; }
    .modal-backdrop.open { display: flex; }
    .modal { background: #fff; border-radius: 20px; padding: 32px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { font-size: 18px; font-weight: 800; color: var(--navy); margin-bottom: 20px; }
    .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .field-group label { display: block; font-size: 12px; font-weight: 600; color: var(--gray); margin-bottom: 4px; }
    .field-group .val { font-size: 14px; color: #222; }
    .field-group textarea, .field-group select { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 14px; font-family: inherit; }
    .field-group textarea:focus, .field-group select:focus { outline: none; border-color: var(--green); }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

    /* 게시글 에디터 */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--green); }

    /* 페이지네이션 */
    .pager { display: flex; gap: 6px; margin-top: 16px; justify-content: center; }
    .pager button { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; font-family: inherit; transition: .15s; }
    .pager button.active, .pager button:hover { background: var(--navy); color: #fff; border-color: var(--navy); }

    /* 빈 상태 */
    .empty { text-align: center; padding: 48px; color: var(--gray); }
    .empty .icon { font-size: 40px; margin-bottom: 8px; }

    /* 스피너 */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,.1); border-top-color: var(--navy); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media(max-width:768px) {
      .sidebar { display: none; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- 사이드바 -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sp">SP DEMOLITION</div>
    <div class="title">선풍건설산업 관리자</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">메뉴</div>
    <button class="nav-item active" onclick="showPanel('dashboard')">
      <span class="icon">📊</span> 대시보드
    </button>
    <button class="nav-item" onclick="showPanel('inquiries')">
      <span class="icon">📨</span> 견적 문의 관리
      <span id="pendingBadge" style="margin-left:auto;background:#ef4444;color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;display:none"></span>
    </button>
    <button class="nav-item" onclick="showPanel('board')">
      <span class="icon">📋</span> 게시판 관리
    </button>
    <button class="nav-item" onclick="showPanel('projects')">
      <span class="icon">🏗</span> 시공 프로젝트
    </button>
    <div class="nav-section" style="margin-top:8px">바로가기</div>
    <button class="nav-item" onclick="window.open('../index.html','_blank')">
      <span class="icon">🌐</span> 홈페이지 보기
    </button>
    <button class="nav-item" onclick="window.open('../contact.html','_blank')">
      <span class="icon">📞</span> 문의 페이지
    </button>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" onclick="doLogout()">🚪 로그아웃</button>
  </div>
</aside>

<!-- 메인 -->
<div class="main">
  <div class="topbar">
    <h1 id="panelTitle">대시보드</h1>
    <div class="meta" id="topbarMeta">관리자</div>
  </div>
  <div class="content">

    <!-- 대시보드 패널 -->
    <div class="panel active" id="panel-dashboard">
      <div class="stat-grid">
        <div class="stat-card orange">
          <div class="label">미처리 문의</div>
          <div class="num" id="stat-pending">-</div>
          <div class="sub">접수 대기 중</div>
        </div>
        <div class="stat-card">
          <div class="label">전체 문의</div>
          <div class="num" id="stat-total">-</div>
          <div class="sub">누적</div>
        </div>
        <div class="stat-card green">
          <div class="label">처리 완료</div>
          <div class="num" id="stat-done">-</div>
          <div class="sub">완료 건수</div>
        </div>
        <div class="stat-card">
          <div class="label">게시글</div>
          <div class="num" id="stat-posts">-</div>
          <div class="sub">전체 게시물</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>최근 견적 문의</h2>
          <button class="btn-new" onclick="showPanel('inquiries')">전체 보기 →</button>
        </div>
        <div class="card-body">
          <table>
            <thead><tr><th>성함</th><th>연락처</th><th>서비스</th><th>주소</th><th>접수일</th><th>상태</th><th>관리</th></tr></thead>
            <tbody id="recentInquiries"><tr><td colspan="7" class="empty"><div class="icon">⏳</div><p>로딩 중...</p></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 견적 문의 패널 -->
    <div class="panel" id="panel-inquiries">
      <div class="card">
        <div class="card-header">
          <h2>견적 문의 관리</h2>
          <div class="filter-bar">
            <select id="inq-status-filter" onchange="loadInquiries(1)">
              <option value="all">전체 상태</option>
              <option value="pending">접수</option>
              <option value="reviewing">검토중</option>
              <option value="completed">완료</option>
              <option value="cancelled">취소</option>
            </select>
            <input type="text" id="inq-search" placeholder="이름·연락처·주소 검색" onkeydown="if(event.key==='Enter')loadInquiries(1)">
            <button onclick="loadInquiries(1)">검색</button>
          </div>
        </div>
        <div class="card-body">
          <table>
            <thead><tr><th>번호</th><th>성함</th><th>연락처</th><th>서비스 유형</th><th>주소</th><th>접수일</th><th>상태</th><th>관리</th></tr></thead>
            <tbody id="inquiryBody"><tr><td colspan="8" class="empty"><div class="spinner"></div></td></tr></tbody>
          </table>
        </div>
      </div>
      <div class="pager" id="inqPager"></div>
    </div>

    <!-- 게시판 패널 -->
    <div class="panel" id="panel-board">
      <div class="card">
        <div class="card-header">
          <h2>게시판 관리</h2>
          <button class="btn-new" onclick="openPostEditor()">+ 새 글 작성</button>
        </div>
        <div class="card-body">
          <table>
            <thead><tr><th>번호</th><th>제목</th><th>분류</th><th>조회</th><th>작성일</th><th>공지</th><th>관리</th></tr></thead>
            <tbody id="boardBody"><tr><td colspan="7" class="empty"><div class="spinner"></div></td></tr></tbody>
          </table>
        </div>
      </div>
      <div class="pager" id="boardPager"></div>
    </div>

    <!-- 시공 프로젝트 패널 -->
    <div class="panel" id="panel-projects">
      <div class="card">
        <div class="card-header">
          <h2>시공 프로젝트 관리</h2>
          <button class="btn-new" onclick="openProjectEditor()">+ 새 프로젝트 추가</button>
        </div>
        <div class="card-body">
          <table>
            <thead><tr><th>제목</th><th>분류</th><th>이미지</th><th>동영상</th><th>상태</th><th>등록일</th><th>관리</th></tr></thead>
            <tbody id="projectBody"><tr><td colspan="7" class="empty"><div class="spinner"></div></td></tr></tbody>
          </table>
        </div>
      </div>
      <div class="pager" id="projectPager"></div>
    </div>

  </div><!-- /content -->
</div><!-- /main -->

<!-- 문의 상세 모달 -->
<div class="modal-backdrop" id="inqModal">
  <div class="modal">
    <h3>📨 견적 문의 상세</h3>
    <div class="modal-row">
      <div class="field-group"><label>성함</label><div class="val" id="m-name"></div></div>
      <div class="field-group"><label>연락처</label><div class="val" id="m-phone"></div></div>
    </div>
    <div class="modal-row">
      <div class="field-group"><label>이메일</label><div class="val" id="m-email"></div></div>
      <div class="field-group"><label>회사</label><div class="val" id="m-company"></div></div>
    </div>
    <div class="modal-row">
      <div class="field-group"><label>현장 주소</label><div class="val" id="m-address"></div></div>
      <div class="field-group"><label>연면적</label><div class="val" id="m-area"></div></div>
    </div>
    <div class="modal-row">
      <div class="field-group"><label>구조</label><div class="val" id="m-structure"></div></div>
      <div class="field-group"><label>서비스 유형</label><div class="val" id="m-service"></div></div>
    </div>
    <div class="form-group"><label>문의 내용</label><div class="val" id="m-message" style="white-space:pre-wrap;font-size:14px;padding:10px;background:var(--light);border-radius:8px;min-height:60px;"></div></div>
    <div class="form-group">
      <label>처리 상태</label>
      <select id="m-status">
        <option value="pending">접수</option>
        <option value="reviewing">검토중</option>
        <option value="completed">완료</option>
        <option value="cancelled">취소</option>
      </select>
    </div>
    <div class="form-group">
      <label>관리자 메모</label>
      <textarea id="m-notes" rows="3" placeholder="내부 메모 (고객에게 노출되지 않음)"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-sm btn-danger" onclick="closeModal('inqModal')">닫기</button>
      <button class="btn-sm btn-primary" onclick="saveInquiry()">저장</button>
    </div>
  </div>
</div>

<!-- 게시글 에디터 모달 -->
<div class="modal-backdrop" id="postModal">
  <div class="modal">
    <h3 id="postModalTitle">📝 게시글 작성</h3>
    <input type="hidden" id="p-id">
    <div class="form-group">
      <label>분류</label>
      <select id="p-category">
        <option value="notice">공지사항</option>
        <option value="project">시공사례</option>
        <option value="news">뉴스</option>
        <option value="qna">Q&A</option>
      </select>
    </div>
    <div class="form-group">
      <label>제목 *</label>
      <input type="text" id="p-title" placeholder="제목을 입력하세요">
    </div>
    <div class="form-group">
      <label>내용 *</label>
      <textarea id="p-content" rows="8" placeholder="내용을 입력하세요"></textarea>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" id="p-notice"> 공지글로 등록
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn-sm btn-danger" onclick="closeModal('postModal')">취소</button>
      <button class="btn-sm btn-primary" onclick="savePost()">저장</button>
    </div>
  </div>
</div>

<!-- 프로젝트 편집 모달 -->
<div class="modal-backdrop" id="projectModal">
  <div class="modal" style="max-width:700px">
    <h3 id="projectModalTitle">🏗 시공 프로젝트 추가</h3>
    <input type="hidden" id="proj-id">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="form-group" style="margin:0">
        <label>제목 *</label>
        <input type="text" id="proj-title" placeholder="공사명을 입력하세요">
      </div>
      <div class="form-group" style="margin:0">
        <label>분류 *</label>
        <select id="proj-category">
          <option value="rc">RC 해체</option>
          <option value="steel">철골 해체</option>
          <option value="interior">내부 철거</option>
          <option value="cutting">정밀 커팅</option>
          <option value="waste">폐기물 처리</option>
        </select>
      </div>
    </div>
    <div class="form-group" style="margin-top:16px">
      <label>설명</label>
      <textarea id="proj-desc" rows="3" placeholder="공사 내용을 간략히 설명해주세요"></textarea>
    </div>
    <div class="form-group">
      <label>태그 <span style="font-weight:400;color:var(--gray)">(쉼표로 구분 예: 연면적 1,200㎡, RC구조, 2024)</span></label>
      <input type="text" id="proj-tags" placeholder="연면적 1,200㎡, 지상 5층, RC구조, 2024">
    </div>
    <div class="form-group">
      <label>동영상 업로드 <span style="font-weight:400;color:var(--gray)">(최대 2개, MP4/MOV/WEBM · 각 500MB 이하 권장)</span></label>
      <input type="file" id="proj-videos" multiple accept="video/*" onchange="previewVideos(this)">
      <div id="proj-video-preview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"></div>
      <div id="proj-existing-videos" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"></div>
    </div>
    <div class="form-group">
      <label>이미지 업로드 <span style="font-weight:400;color:var(--gray)">(최대 7장, JPG/PNG/WEBP)</span></label>
      <input type="file" id="proj-images" multiple accept="image/*" onchange="previewImages(this)">
      <div id="proj-img-preview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"></div>
      <div id="proj-existing-imgs" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"></div>
    </div>
    <div class="form-group">
      <label>공개 상태</label>
      <select id="proj-status">
        <option value="published">공개</option>
        <option value="draft">비공개(임시저장)</option>
      </select>
    </div>
    <div id="proj-upload-progress" style="display:none;color:var(--green);font-size:13px;margin-bottom:8px">⏳ 파일 업로드 중...</div>
    <div class="modal-footer">
      <button class="btn-sm btn-danger" onclick="closeModal('projectModal')">취소</button>
      <button class="btn-sm btn-primary" onclick="saveProject()">저장</button>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/db.js"></script>
<script>
// ── 인증 체크 ──────────────────────────────────────────────
(async () => {
  const ok = await isAdminLoggedIn();
  if (!ok) { location.href = 'index.html'; return; }
  document.getElementById('topbarMeta').textContent =
    new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
  loadDashboard();
})();

// ── 패널 전환 ──────────────────────────────────────────────
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  // 클릭된 버튼 active
  const navBtns = document.querySelectorAll('.nav-item');
  navBtns.forEach(btn => { if (btn.getAttribute('onclick')?.includes(`'${name}'`)) btn.classList.add('active'); });
  const titles = { dashboard:'대시보드', inquiries:'견적 문의 관리', board:'게시판 관리', projects:'시공 프로젝트 관리' };
  document.getElementById('panelTitle').textContent = titles[name] || name;
  if (name === 'inquiries') loadInquiries(1);
  if (name === 'board') loadBoard(1);
  if (name === 'projects') loadProjectsPanel(1);
}

// ── 대시보드 ───────────────────────────────────────────────
async function loadDashboard() {
  try {
    const [all, pending, done, posts] = await Promise.all([
      getInquiries({ page:1, limit:1 }),
      getInquiries({ status:'pending', page:1, limit:1 }),
      getInquiries({ status:'completed', page:1, limit:1 }),
      getPosts({ page:1, limit:1 }),
    ]);
    document.getElementById('stat-total').textContent = all.count ?? 0;
    document.getElementById('stat-pending').textContent = pending.count ?? 0;
    document.getElementById('stat-done').textContent = done.count ?? 0;
    document.getElementById('stat-posts').textContent = posts.count ?? 0;
    if ((pending.count ?? 0) > 0) {
      const badge = document.getElementById('pendingBadge');
      badge.textContent = pending.count;
      badge.style.display = 'inline';
    }
    const { data } = await getInquiries({ page:1, limit:5 });
    renderInquiryRows(data, 'recentInquiries', true);
  } catch(e) { console.error(e); }
}

// ── 견적 문의 ──────────────────────────────────────────────
let inqPage = 1, inqTotal = 0;
async function loadInquiries(page) {
  inqPage = page;
  const status = document.getElementById('inq-status-filter').value;
  const search = document.getElementById('inq-search').value.trim();
  document.getElementById('inquiryBody').innerHTML = '<tr><td colspan="8" class="empty"><div class="spinner"></div></td></tr>';
  try {
    const { data, count } = await getInquiries({ status, search, page, limit:20 });
    inqTotal = count;
    renderInquiryRows(data, 'inquiryBody', false);
    renderPager('inqPager', count, 20, page, loadInquiries);
  } catch(e) {
    document.getElementById('inquiryBody').innerHTML = `<tr><td colspan="8" class="empty">오류: ${e.message}</td></tr>`;
  }
}

function renderInquiryRows(data, tbodyId, compact) {
  const tbody = document.getElementById(tbodyId);
  if (!data || data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty"><div class="icon">📭</div><p>데이터가 없습니다</p></td></tr>';
    return;
  }
  tbody.innerHTML = data.map((r, i) => `
    <tr>
      ${compact ? '' : `<td class="text-center" style="color:var(--gray);font-size:12px">${inqTotal - (inqPage-1)*20 - i}</td>`}
      <td style="font-weight:600">${r.name}</td>
      <td>${r.phone}</td>
      <td>${r.service_type || '-'}</td>
      <td style="color:var(--gray);font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.address || '-'}</td>
      <td style="color:var(--gray);font-size:12px">${formatDate(r.created_at)}</td>
      <td>${statusTag(r.status)}</td>
      <td><button class="btn-sm btn-primary" onclick="openInqModal(${JSON.stringify(r).replace(/"/g,'&quot;')})">상세</button></td>
    </tr>
  `).join('');
}

let currentInqId = null;
function openInqModal(r) {
  currentInqId = r.id;
  document.getElementById('m-name').textContent = r.name;
  document.getElementById('m-phone').textContent = r.phone;
  document.getElementById('m-email').textContent = r.email || '-';
  document.getElementById('m-company').textContent = r.company || '-';
  document.getElementById('m-address').textContent = r.address || '-';
  document.getElementById('m-area').textContent = r.area ? r.area + ' ㎡' : '-';
  document.getElementById('m-structure').textContent = r.structure || '-';
  document.getElementById('m-service').textContent = r.service_type || '-';
  document.getElementById('m-message').textContent = r.message || '(내용 없음)';
  document.getElementById('m-status').value = r.status || 'pending';
  document.getElementById('m-notes').value = r.admin_notes || '';
  document.getElementById('inqModal').classList.add('open');
}

async function saveInquiry() {
  try {
    await updateInquiry(currentInqId, {
      status: document.getElementById('m-status').value,
      admin_notes: document.getElementById('m-notes').value,
    });
    closeModal('inqModal');
    toast('저장되었습니다');
    if (document.getElementById('panel-inquiries').classList.contains('active')) loadInquiries(inqPage);
    loadDashboard();
  } catch(e) { toast('저장 오류: ' + e.message, 'error'); }
}

// ── 게시판 ─────────────────────────────────────────────────
let boardPage = 1, boardTotal = 0;
async function loadBoard(page) {
  boardPage = page;
  document.getElementById('boardBody').innerHTML = '<tr><td colspan="7" class="empty"><div class="spinner"></div></td></tr>';
  try {
    const { data, count } = await getPosts({ page, limit:20 });
    boardTotal = count;
    const tbody = document.getElementById('boardBody');
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty"><div class="icon">📋</div><p>게시글이 없습니다</p></td></tr>';
      return;
    }
    tbody.innerHTML = data.map((p, i) => `
      <tr>
        <td style="color:var(--gray);font-size:12px">${boardTotal - (boardPage-1)*20 - i}</td>
        <td style="font-weight:600;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.title}</td>
        <td><span class="tag tag-blue">${catLabel(p.category)}</span></td>
        <td>${p.views || 0}</td>
        <td style="color:var(--gray);font-size:12px">${formatDate(p.created_at)}</td>
        <td>${p.is_notice ? '<span class="tag tag-green">공지</span>' : '-'}</td>
        <td style="display:flex;gap:6px">
          <button class="btn-sm btn-primary" onclick="openPostEditor(${JSON.stringify(p).replace(/"/g,'&quot;')})">수정</button>
          <button class="btn-sm btn-danger" onclick="delPost(${p.id})">삭제</button>
        </td>
      </tr>
    `).join('');
    renderPager('boardPager', count, 20, page, loadBoard);
  } catch(e) {
    document.getElementById('boardBody').innerHTML = `<tr><td colspan="7" class="empty">오류: ${e.message}</td></tr>`;
  }
}

function openPostEditor(post) {
  document.getElementById('postModalTitle').textContent = post ? '📝 게시글 수정' : '📝 새 게시글 작성';
  document.getElementById('p-id').value = post?.id || '';
  document.getElementById('p-category').value = post?.category || 'notice';
  document.getElementById('p-title').value = post?.title || '';
  document.getElementById('p-content').value = post?.content || '';
  document.getElementById('p-notice').checked = post?.is_notice || false;
  document.getElementById('postModal').classList.add('open');
}

async function savePost() {
  const id = document.getElementById('p-id').value;
  const data = {
    category: document.getElementById('p-category').value,
    title: document.getElementById('p-title').value.trim(),
    content: document.getElementById('p-content').value.trim(),
    is_notice: document.getElementById('p-notice').checked,
    author: '관리자',
  };
  if (!data.title || !data.content) { toast('제목과 내용을 입력하세요', 'error'); return; }
  try {
    if (id) await updatePost(id, data);
    else await createPost(data);
    closeModal('postModal');
    toast(id ? '수정되었습니다' : '등록되었습니다');
    loadBoard(boardPage);
  } catch(e) { toast('저장 오류: ' + e.message, 'error'); }
}

async function delPost(id) {
  if (!confirm('게시글을 삭제하시겠습니까?')) return;
  try {
    await deletePost(id);
    toast('삭제되었습니다');
    loadBoard(boardPage);
  } catch(e) { toast('삭제 오류: ' + e.message, 'error'); }
}

// ── 공통 유틸 ──────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-backdrop').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

function catLabel(cat) {
  return { notice:'공지', project:'시공사례', news:'뉴스', qna:'Q&A' }[cat] || cat;
}

function statusTag(s) {
  const map = { pending:'tag-yellow', reviewing:'tag-blue', completed:'tag-green', cancelled:'tag-red' };
  const labels = { pending:'접수', reviewing:'검토중', completed:'완료', cancelled:'취소' };
  return `<span class="tag ${map[s]||'tag-gray'}">${labels[s]||s}</span>`;
}

function formatDate(dt) {
  if (!dt) return '';
  return new Date(dt).toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' });
}

function renderPager(id, count, limit, current, fn) {
  const pages = Math.ceil(count / limit);
  const el = document.getElementById(id);
  if (pages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = Array.from({ length: pages }, (_, i) => i + 1)
    .map(n => `<button class="${n===current?'active':''}" onclick="${fn.name}(${n})">${n}</button>`)
    .join('');
}

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;background:${type==='error'?'#ef4444':'#22c55e'};color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:fadeUp .3s ease`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── 시공 프로젝트 ──────────────────────────────────────────
const projCatLabel = { rc:'RC 해체', steel:'철골 해체', interior:'내부 철거', cutting:'정밀 커팅', waste:'폐기물 처리' };
let projPage = 1, projTotal = 0, projEditImages = [], projEditVideos = [];

async function loadProjectsPanel(page) {
  projPage = page;
  document.getElementById('projectBody').innerHTML = '<tr><td colspan="7" class="empty"><div class="spinner"></div></td></tr>';
  try {
    const { data, count } = await getAllProjectsAdmin({ page, limit: 20 });
    projTotal = count;
    const tbody = document.getElementById('projectBody');
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty"><div class="icon">🏗</div><p>프로젝트가 없습니다</p></td></tr>';
      return;
    }
    tbody.innerHTML = data.map(p => `
      <tr>
        <td style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.title}</td>
        <td><span class="tag tag-blue">${projCatLabel[p.category] || p.category}</span></td>
        <td style="color:var(--gray)">${(p.images||[]).length}장</td>
        <td style="color:var(--gray)">${(p.videos||[]).length}개</td>
        <td><span class="tag ${p.status==='published'?'tag-green':'tag-gray'}">${p.status==='published'?'공개':'비공개'}</span></td>
        <td style="color:var(--gray);font-size:12px">${formatDate(p.created_at)}</td>
        <td style="display:flex;gap:6px">
          <button class="btn-sm btn-primary" onclick="openProjectEditor(${JSON.stringify(p).replace(/"/g,'&quot;')})">수정</button>
          <button class="btn-sm btn-danger" onclick="delProject(${p.id})">삭제</button>
        </td>
      </tr>
    `).join('');
    renderPager('projectPager', count, 20, page, loadProjectsPanel);
  } catch(e) {
    document.getElementById('projectBody').innerHTML = `<tr><td colspan="7" class="empty">오류: ${e.message}</td></tr>`;
  }
}

function openProjectEditor(proj) {
  projEditImages = proj?.images || [];
  projEditVideos = proj?.videos || [];
  document.getElementById('projectModalTitle').textContent = proj ? '🏗 프로젝트 수정' : '🏗 시공 프로젝트 추가';
  document.getElementById('proj-id').value = proj?.id || '';
  document.getElementById('proj-title').value = proj?.title || '';
  document.getElementById('proj-category').value = proj?.category || 'rc';
  document.getElementById('proj-desc').value = proj?.description || '';
  document.getElementById('proj-tags').value = (proj?.tags || []).join(', ');
  document.getElementById('proj-status').value = proj?.status || 'published';
  document.getElementById('proj-videos').value = '';
  document.getElementById('proj-images').value = '';
  document.getElementById('proj-video-preview').innerHTML = '';
  document.getElementById('proj-img-preview').innerHTML = '';
  document.getElementById('proj-upload-progress').style.display = 'none';
  // 기존 동영상 표시
  const existVidEl = document.getElementById('proj-existing-videos');
  existVidEl.innerHTML = projEditVideos.map((url, i) => `
    <div style="position:relative;display:inline-block">
      <video src="${url}" style="width:120px;height:72px;object-fit:cover;border-radius:8px;border:2px solid var(--border)" muted></video>
      <span style="position:absolute;bottom:4px;left:4px;font-size:10px;color:#fff;background:rgba(0,0,0,.6);padding:1px 4px;border-radius:4px">영상 ${i+1}</span>
      <button onclick="removeExistingVideo(${i})" style="position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:12px;padding:0">×</button>
    </div>`).join('');
  // 기존 이미지 표시
  const existEl = document.getElementById('proj-existing-imgs');
  existEl.innerHTML = projEditImages.map((url, i) => `
    <div style="position:relative;display:inline-block">
      <img src="${url}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:2px solid var(--border)">
      <button onclick="removeExistingImg(${i})" style="position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:12px;padding:0">×</button>
    </div>`).join('');
  document.getElementById('projectModal').classList.add('open');
}

function _currentEditObj() {
  return { id: document.getElementById('proj-id').value, title: document.getElementById('proj-title').value,
    category: document.getElementById('proj-category').value, description: document.getElementById('proj-desc').value,
    tags: document.getElementById('proj-tags').value.split(',').map(t=>t.trim()),
    status: document.getElementById('proj-status').value,
    images: projEditImages, videos: projEditVideos };
}

function removeExistingImg(i) {
  projEditImages.splice(i, 1);
  openProjectEditor(_currentEditObj());
}

function removeExistingVideo(i) {
  projEditVideos.splice(i, 1);
  openProjectEditor(_currentEditObj());
}

function previewVideos(input) {
  const preview = document.getElementById('proj-video-preview');
  preview.innerHTML = '';
  Array.from(input.files).slice(0, 2).forEach((file, idx) => {
    const url = URL.createObjectURL(file);
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;display:inline-block';
    wrap.innerHTML = `<video src="${url}" style="width:120px;height:72px;object-fit:cover;border-radius:8px;border:2px solid var(--green)" muted></video>
      <span style="position:absolute;bottom:4px;left:4px;font-size:10px;color:#fff;background:rgba(0,0,0,.6);padding:1px 4px;border-radius:4px">영상 ${idx+1}</span>`;
    preview.appendChild(wrap);
  });
}

function previewImages(input) {
  const preview = document.getElementById('proj-img-preview');
  preview.innerHTML = '';
  Array.from(input.files).slice(0, 7).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.style.cssText = 'width:72px;height:72px;object-fit:cover;border-radius:8px;border:2px solid var(--green)';
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

async function saveProject() {
  const id = document.getElementById('proj-id').value;
  const title = document.getElementById('proj-title').value.trim();
  if (!title) { toast('제목을 입력하세요', 'error'); return; }
  const data = {
    title,
    category: document.getElementById('proj-category').value,
    description: document.getElementById('proj-desc').value.trim(),
    tags: document.getElementById('proj-tags').value.split(',').map(t => t.trim()).filter(Boolean),
    status: document.getElementById('proj-status').value,
    images: [...projEditImages],
    videos: [...projEditVideos],
  };
  try {
    const progressEl = document.getElementById('proj-upload-progress');
    const imgFiles = document.getElementById('proj-images').files;
    const vidFiles = document.getElementById('proj-videos').files;
    const hasFiles = imgFiles.length > 0 || vidFiles.length > 0;
    let projectId = id;
    if (!id) {
      const row = await createProject(data);
      projectId = row.id;
      if (hasFiles) {
        progressEl.style.display = 'block';
        if (imgFiles.length > 0) {
          const imgUrls = await uploadProjectImages(projectId, imgFiles);
          data.images = imgUrls;
        }
        if (vidFiles.length > 0) {
          const vidUrls = await uploadProjectVideos(projectId, vidFiles);
          data.videos = vidUrls;
        }
        await updateProject(projectId, { images: data.images, videos: data.videos });
      }
    } else {
      if (hasFiles) {
        progressEl.style.display = 'block';
        if (imgFiles.length > 0) {
          const newImgUrls = await uploadProjectImages(id, imgFiles);
          data.images = [...projEditImages, ...newImgUrls].slice(0, 7);
        }
        if (vidFiles.length > 0) {
          const newVidUrls = await uploadProjectVideos(id, vidFiles);
          data.videos = [...projEditVideos, ...newVidUrls].slice(0, 2);
        }
      }
      await updateProject(id, data);
    }
    closeModal('projectModal');
    toast(id ? '수정되었습니다' : '등록되었습니다');
    loadProjectsPanel(projPage);
  } catch(e) { toast('저장 오류: ' + e.message, 'error'); }
}

async function delProject(id) {
  if (!confirm('프로젝트를 삭제하시겠습니까?')) return;
  try {
    await deleteProject(id);
    toast('삭제되었습니다');
    loadProjectsPanel(projPage);
  } catch(e) { toast('삭제 오류: ' + e.message, 'error'); }
}

async function doLogout() {
  await adminLogout();
  location.href = 'index.html';
}

// 스타일 추가
document.head.insertAdjacentHTML('beforeend', '<style>@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}</style>');
</script>
</body>
</html>

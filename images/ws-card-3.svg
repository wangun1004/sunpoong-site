<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <!-- 배경 -->
  <rect width="400" height="240" fill="#c8d8c0"/>
  <!-- 하늘 -->
  <rect width="400" height="150" fill="#d0e8f0"/>
  <!-- 구름 -->
  <ellipse cx="80" cy="30" rx="50" ry="20" fill="white" opacity="0.7"/>
  <ellipse cx="115" cy="24" rx="32" ry="15" fill="white" opacity="0.7"/>
  <ellipse cx="310" cy="25" rx="55" ry="22" fill="white" opacity="0.7"/>
  <!-- 도로/지면 -->
  <rect x="0" y="148" width="400" height="92" fill="#8a7a60"/>
  <!-- 도로 포장 -->
  <rect x="0" y="148" width="400" height="4" fill="#a09070"/>
  <!-- 잔해 더미 (왼쪽) -->
  <ellipse cx="60" cy="158" rx="55" ry="20" fill="#7a6040" opacity="0.7"/>
  <polygon points="10,150 50,128 90,145 110,132 130,150" fill="#8a7255"/>
  <polygon points="15,150 50,135 80,148" fill="#7a6245"/>
  <polygon points="55,130 85,128 95,145" fill="#6a5535"/>
  <!-- 잔해 세부 -->
  <rect x="20" y="143" width="18" height="10" rx="1" fill="#9a8060" transform="rotate(-15 29 148)"/>
  <rect x="70" y="140" width="22" height="8" rx="1" fill="#8a7050" transform="rotate(8 81 144)"/>
  <rect x="100" y="144" width="15" height="9" rx="1" fill="#948060" transform="rotate(-5 107 148)"/>

  <!-- ===== 덤프트럭 ===== -->
  <!-- 적재함 (컨테이너) -->
  <rect x="115" y="90" width="230" height="75" rx="4" fill="#16a34a" stroke="#15803d" stroke-width="2.5"/>
  <!-- 컨테이너 줄무늬 -->
  <line x1="155" y1="90" x2="155" y2="165" stroke="#15803d" stroke-width="1.5"/>
  <line x1="195" y1="90" x2="195" y2="165" stroke="#15803d" stroke-width="1.5"/>
  <line x1="235" y1="90" x2="235" y2="165" stroke="#15803d" stroke-width="1.5"/>
  <line x1="275" y1="90" x2="275" y2="165" stroke="#15803d" stroke-width="1.5"/>
  <line x1="315" y1="90" x2="315" y2="165" stroke="#15803d" stroke-width="1.5"/>
  <!-- 컨테이너 상단 테두리 -->
  <rect x="115" y="90" width="230" height="8" rx="2" fill="#15803d"/>
  <!-- 회사명 텍스트 영역 -->
  <rect x="145" y="115" width="170" height="28" rx="3" fill="rgba(0,0,0,0.2)"/>
  <text x="230" y="134" font-family="'Noto Sans KR', sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">선풍건설산업</text>
  <!-- 컨테이너 잔해 상단 -->
  <polygon points="120,90 180,70 240,82 300,68 345,88 345,90 120,90" fill="#7a6040"/>
  <polygon points="140,90 175,75 210,85 250,72 290,82 320,72 345,88" fill="#8a7050"/>
  <!-- 운전석 -->
  <rect x="310" y="100" width="75" height="68" rx="5" fill="#1a5c28" stroke="#15803d" stroke-width="2"/>
  <rect x="316" y="106" width="55" height="30" rx="3" fill="#bfdbfe" stroke="#93c5fd" stroke-width="1"/>
  <!-- 운전석 불빛 -->
  <rect x="350" y="155" width="30" height="12" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <!-- 바퀴 4개 -->
  <circle cx="155" cy="185" r="22" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <circle cx="155" cy="185" r="12" fill="#475569"/>
  <circle cx="155" cy="185" r="5" fill="#64748b"/>
  <circle cx="235" cy="185" r="22" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <circle cx="235" cy="185" r="12" fill="#475569"/>
  <circle cx="235" cy="185" r="5" fill="#64748b"/>
  <circle cx="315" cy="185" r="22" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <circle cx="315" cy="185" r="12" fill="#475569"/>
  <circle cx="315" cy="185" r="5" fill="#64748b"/>
  <circle cx="362" cy="185" r="18" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <circle cx="362" cy="185" r="10" fill="#475569"/>
  <!-- 차체 하단 프레임 -->
  <rect x="115" y="163" width="225" height="10" rx="2" fill="#166534"/>
  <!-- 배기 연기 -->
  <circle cx="395" cy="108" r="7" fill="#94a3b8" opacity="0.5"/>
  <circle cx="398" cy="98" r="5" fill="#94a3b8" opacity="0.4"/>
  <circle cx="393" cy="90" r="4" fill="#94a3b8" opacity="0.3"/>

  <!-- 텍스트 배너 -->
  <rect x="0" y="210" width="400" height="30" fill="rgba(28,92,48,0.9)"/>
  <text x="200" y="230" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">철거 폐기물 수집·운반·합법 처리</text>
</svg>

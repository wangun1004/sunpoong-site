<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <!-- 배경: 콘크리트 벽 -->
  <rect width="400" height="240" fill="#3a3a3a"/>
  <!-- 콘크리트 텍스처 패턴 -->
  <rect x="0" y="0" width="400" height="240" fill="#404040"/>
  <line x1="0" y1="40" x2="400" y2="40" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="0" y1="80" x2="400" y2="80" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="80" y1="0" x2="80" y2="240" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="240" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="240" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="240" stroke="#4a4a4a" stroke-width="1"/>
  <!-- 벽면 균열/절단 흔적 -->
  <line x1="140" y1="0" x2="140" y2="210" stroke="#555" stroke-width="3"/>
  <line x1="260" y1="0" x2="260" y2="210" stroke="#555" stroke-width="3"/>
  <!-- 절단선 (중심부) -->
  <rect x="152" y="30" width="96" height="150" rx="2" fill="#2a2a2a" stroke="#666" stroke-width="2"/>
  <!-- 절단 가이드 라인 -->
  <line x1="200" y1="30" x2="200" y2="180" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/>
  <line x1="152" y1="105" x2="248" y2="105" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/>

  <!-- ===== 다이아몬드 월 쏘 (벽면 절단기) ===== -->
  <!-- 레일 시스템 (가로) -->
  <rect x="120" y="95" width="160" height="14" rx="3" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="120" y="98" width="160" height="8" rx="2" fill="#374151"/>
  <!-- 레일 고정 앵커 -->
  <rect x="118" y="90" width="14" height="24" rx="2" fill="#4b5563"/>
  <rect x="268" y="90" width="14" height="24" rx="2" fill="#4b5563"/>
  <!-- 쏘 본체 (빨간색) -->
  <rect x="170" y="78" width="60" height="46" rx="6" fill="#dc2626" stroke="#b91c1c" stroke-width="2"/>
  <rect x="175" y="83" width="50" height="36" rx="4" fill="#ef4444"/>
  <!-- 쏘 블레이드 (원형) -->
  <circle cx="200" cy="145" r="42" fill="#374151" stroke="#1f2937" stroke-width="2"/>
  <circle cx="200" cy="145" r="36" fill="#4b5563" stroke="#374151" stroke-width="1.5"/>
  <!-- 다이아몬드 세그먼트 -->
  <circle cx="200" cy="109" r="5" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <circle cx="226" cy="117" r="5" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <circle cx="236" cy="145" r="5" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <circle cx="226" cy="173" r="5" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <circle cx="200" cy="181" r="5" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <circle cx="174" cy="173" r="5" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <circle cx="164" cy="145" r="5" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <circle cx="174" cy="117" r="5" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <!-- 블레이드 허브 -->
  <circle cx="200" cy="145" r="15" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <circle cx="200" cy="145" r="7" fill="#374151"/>
  <!-- 스핀들 연결 -->
  <rect x="192" y="100" width="16" height="10" rx="2" fill="#1f2937"/>

  <!-- ===== 물/냉각수 분사 ===== -->
  <line x1="165" y1="148" x2="125" y2="165" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="162" y1="152" x2="118" y2="172" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="168" y1="145" x2="130" y2="158" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- 물방울 -->
  <circle cx="122" cy="168" r="3" fill="#60a5fa" opacity="0.6"/>
  <circle cx="115" cy="175" r="2" fill="#93c5fd" opacity="0.5"/>
  <circle cx="108" cy="170" r="2.5" fill="#60a5fa" opacity="0.5"/>

  <!-- ===== 불꽃/스파크 ===== -->
  <line x1="236" y1="148" x2="268" y2="138" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="234" y1="145" x2="272" y2="132" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="238" y1="150" x2="274" y2="148" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="272" cy="137" r="3" fill="#fbbf24" opacity="0.8"/>
  <circle cx="278" cy="130" r="2" fill="#f59e0b" opacity="0.7"/>
  <circle cx="275" cy="150" r="2.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="282" cy="143" r="2" fill="#f59e0b" opacity="0.5"/>
  <circle cx="268" cy="125" r="1.5" fill="#fde68a" opacity="0.8"/>

  <!-- 절단 먼지/분진 -->
  <circle cx="200" cy="188" r="20" fill="#94a3b8" opacity="0.3"/>
  <circle cx="185" cy="195" r="12" fill="#9ca3af" opacity="0.25"/>
  <circle cx="215" cy="192" r="14" fill="#94a3b8" opacity="0.2"/>

  <!-- 작업자 (우측) -->
  <!-- 다리 -->
  <line x1="340" y1="165" x2="325" y2="208" stroke="#1e3a5f" stroke-width="10" stroke-linecap="round"/>
  <line x1="340" y1="165" x2="358" y2="205" stroke="#1e3a5f" stroke-width="10" stroke-linecap="round"/>
  <!-- 신발 -->
  <ellipse cx="322" cy="210" rx="11" ry="5" fill="#111"/>
  <ellipse cx="360" cy="207" rx="11" ry="5" fill="#111"/>
  <!-- 몸통 (형광 조끼) -->
  <rect x="323" y="123" width="34" height="44" rx="6" fill="#f59e0b"/>
  <rect x="327" y="127" width="26" height="36" rx="4" fill="#fbbf24"/>
  <!-- 형광 스트라이프 -->
  <line x1="323" y1="140" x2="357" y2="140" stroke="#22c55e" stroke-width="3"/>
  <line x1="323" y1="152" x2="357" y2="152" stroke="#22c55e" stroke-width="3"/>
  <!-- 왼팔 (컨트롤러 방향) -->
  <line x1="324" y1="133" x2="295" y2="118" stroke="#d97706" stroke-width="9" stroke-linecap="round"/>
  <line x1="295" y1="118" x2="278" y2="108" stroke="#d97706" stroke-width="8" stroke-linecap="round"/>
  <!-- 오른팔 -->
  <line x1="356" y1="133" x2="378" y2="120" stroke="#d97706" stroke-width="9" stroke-linecap="round"/>
  <!-- 목 -->
  <line x1="340" y1="123" x2="340" y2="113" stroke="#d97706" stroke-width="8" stroke-linecap="round"/>
  <!-- 머리 -->
  <circle cx="340" cy="103" r="16" fill="#d97706"/>
  <!-- 안전모 (노란색) -->
  <ellipse cx="340" cy="94" rx="20" ry="10" fill="#fbbf24"/>
  <rect x="322" y="90" width="36" height="10" rx="3" fill="#f59e0b"/>
  <rect x="320" y="96" width="40" height="5" rx="2" fill="#d97706"/>
  <!-- 방진 마스크 -->
  <rect x="331" y="108" width="20" height="12" rx="5" fill="#e5e7eb"/>
  <line x1="334" y1="112" x2="334" y2="117" stroke="#d1d5db" stroke-width="1"/>
  <line x1="340" y1="112" x2="340" y2="117" stroke="#d1d5db" stroke-width="1"/>
  <line x1="346" y1="112" x2="346" y2="117" stroke="#d1d5db" stroke-width="1"/>
  <!-- 눈 -->
  <circle cx="335" cy="106" r="2.5" fill="#333"/>
  <circle cx="345" cy="106" r="2.5" fill="#333"/>
  <!-- 컨트롤러 (손에) -->
  <rect x="265" y="104" width="18" height="12" rx="3" fill="#374151"/>
  <circle cx="271" cy="108" r="2" fill="#22c55e"/>
  <circle cx="277" cy="108" r="2" fill="#ef4444"/>

  <!-- 텍스트 배너 -->
  <rect x="0" y="210" width="400" height="30" fill="rgba(28,92,48,0.9)"/>
  <text x="200" y="230" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">콘크리트·석재 벽체 무진동 정밀 절단</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- 배경 -->
  <rect width="400" height="300" fill="#c8b89a"/>
  <!-- 바닥 -->
  <rect x="0" y="248" width="400" height="52" fill="#9b8050"/>
  <!-- 실내 벽 -->
  <rect x="0" y="0" width="400" height="252" fill="#e0d0bc"/>
  <!-- 천장 (일부 뜯긴) -->
  <rect x="0" y="0" width="400" height="55" fill="#d4cfc8"/>
  <!-- 천장 텍스 (격자 패턴) -->
  <g stroke="#bbb0a0" stroke-width="1" opacity="0.6">
    <line x1="0" y1="18" x2="400" y2="18"/>
    <line x1="0" y1="36" x2="400" y2="36"/>
    <line x1="30" y1="0" x2="30" y2="55"/>
    <line x1="90" y1="0" x2="90" y2="55"/>
    <line x1="150" y1="0" x2="150" y2="55"/>
    <line x1="210" y1="0" x2="210" y2="55"/>
    <line x1="270" y1="0" x2="270" y2="55"/>
    <line x1="330" y1="0" x2="330" y2="55"/>
    <line x1="390" y1="0" x2="390" y2="55"/>
  </g>
  <!-- 뜯긴 천장 부분 (노출 구조) -->
  <polygon points="130,0 250,0 265,55 115,55" fill="transparent"/>
  <rect x="115" y="0" width="150" height="55" fill="#a89880" rx="1"/>
  <!-- 내부 구조재 노출 -->
  <line x1="140" y1="0" x2="140" y2="55" stroke="#7a6a5a" stroke-width="4"/>
  <line x1="170" y1="0" x2="170" y2="55" stroke="#7a6a5a" stroke-width="4"/>
  <line x1="200" y1="0" x2="200" y2="55" stroke="#7a6a5a" stroke-width="4"/>
  <line x1="230" y1="0" x2="230" y2="55" stroke="#7a6a5a" stroke-width="4"/>
  <line x1="260" y1="0" x2="260" y2="55" stroke="#7a6a5a" stroke-width="3"/>
  <!-- 텍스 조각들 떨어지는 -->
  <rect x="155" y="55" width="22" height="14" rx="2" fill="#cfc8ba" transform="rotate(-15 165 62)"/>
  <rect x="195" y="50" width="18" height="12" rx="2" fill="#c8c0b0" transform="rotate(10 204 56)"/>
  <rect x="230" y="57" width="20" height="10" rx="2" fill="#d0c8b8" transform="rotate(-8 240 62)"/>
  <!-- 떨어진 조각 바닥 -->
  <ellipse cx="190" cy="252" rx="40" ry="10" fill="#b8a890" opacity="0.5"/>
  <polygon points="168,248 185,245 188,255 170,257" fill="#c8bfaf"/>
  <polygon points="195,246 215,244 213,254 193,256" fill="#c0b8a8"/>
  <polygon points="222,249 238,247 236,257 220,258" fill="#c8bfaf"/>
  <!-- 먼지 -->
  <circle cx="200" cy="80" r="20" fill="white" opacity="0.2"/>
  <circle cx="175" cy="70" r="12" fill="white" opacity="0.15"/>
  <!-- 사다리 -->
  <line x1="300" y1="60" x2="285" y2="252" stroke="#6b5a3e" stroke-width="8" stroke-linecap="round"/>
  <line x1="340" y1="60" x2="325" y2="252" stroke="#6b5a3e" stroke-width="8" stroke-linecap="round"/>
  <line x1="287" y1="100" x2="327" y2="100" stroke="#8b7a5e" stroke-width="5" stroke-linecap="round"/>
  <line x1="284" y1="135" x2="324" y2="135" stroke="#8b7a5e" stroke-width="5" stroke-linecap="round"/>
  <line x1="281" y1="170" x2="321" y2="170" stroke="#8b7a5e" stroke-width="5" stroke-linecap="round"/>
  <line x1="278" y1="205" x2="318" y2="205" stroke="#8b7a5e" stroke-width="5" stroke-linecap="round"/>
  <!-- 사다리 위 철거공 -->
  <!-- 다리 -->
  <line x1="307" y1="160" x2="295" y2="195" stroke="#1e2a45" stroke-width="10" stroke-linecap="round"/>
  <line x1="307" y1="160" x2="320" y2="193" stroke="#1e2a45" stroke-width="10" stroke-linecap="round"/>
  <!-- 발 (사다리 발판 위) -->
  <ellipse cx="292" cy="197" rx="11" ry="5" fill="#2c2c2c"/>
  <ellipse cx="323" cy="195" rx="11" ry="5" fill="#2c2c2c"/>
  <!-- 몸통 (파란 작업복) -->
  <rect x="292" y="118" width="32" height="44" rx="8" fill="#1a3a6e"/>
  <rect x="296" y="122" width="24" height="36" rx="6" fill="#2a4a8e"/>
  <!-- 왼팔 (위로 뻗어 천장 작업) -->
  <line x1="293" y1="128" x2="250" y2="80" stroke="#8B4513" stroke-width="9" stroke-linecap="round"/>
  <line x1="250" y1="80" x2="220" y2="58" stroke="#8B4513" stroke-width="8" stroke-linecap="round"/>
  <!-- 오른팔 (위로 뻗어) -->
  <line x1="323" y1="128" x2="355" y2="85" stroke="#8B4513" stroke-width="9" stroke-linecap="round"/>
  <line x1="355" y1="85" x2="368" y2="66" stroke="#8B4513" stroke-width="8" stroke-linecap="round"/>
  <!-- 장갑 -->
  <circle cx="218" cy="56" r="7" fill="#4a4a6a"/>
  <circle cx="370" cy="64" r="7" fill="#4a4a6a"/>
  <!-- 천장 텍스 잡아당기는 모양 -->
  <polygon points="205,40 235,35 240,55 210,58" fill="#d0c8b8" stroke="#b0a898" stroke-width="1.5"/>
  <!-- 목 -->
  <line x1="308" y1="118" x2="308" y2="108" stroke="#8B4513" stroke-width="8" stroke-linecap="round"/>
  <!-- 머리 -->
  <circle cx="308" cy="98" r="16" fill="#f5a623"/>
  <!-- 안전모 -->
  <ellipse cx="308" cy="89" rx="19" ry="10" fill="#f5a623"/>
  <rect x="291" y="86" width="34" height="10" rx="3" fill="#e09000"/>
  <rect x="289" y="92" width="38" height="5" rx="2" fill="#cc8000"/>
  <!-- 얼굴 (위 보는 자세) -->
  <circle cx="304" cy="101" r="2.5" fill="#333"/>
  <circle cx="314" cy="101" r="2.5" fill="#333"/>
  <!-- 마스크 -->
  <rect x="300" y="105" width="18" height="10" rx="4" fill="#e0e0e0"/>
  <line x1="303" y1="108" x2="303" y2="112" stroke="#ccc" stroke-width="1"/>
  <line x1="309" y1="108" x2="309" y2="112" stroke="#ccc" stroke-width="1"/>
  <line x1="315" y1="108" x2="315" y2="112" stroke="#ccc" stroke-width="1"/>

  <!-- 텍스트 배너 -->
  <rect x="0" y="262" width="400" height="38" fill="rgba(28,92,48,0.85)"/>
  <text x="200" y="286" font-family="'Noto Sans KR', sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">천장 텍스 인력 제거 작업</text>
</svg>

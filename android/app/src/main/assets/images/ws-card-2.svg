<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <!-- 배경: 하늘 -->
  <rect width="400" height="240" fill="#87ceeb"/>
  <!-- 하늘 그라디언트 -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec8e3"/>
      <stop offset="100%" stop-color="#c5e8f7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#sky)"/>
  <!-- 구름 -->
  <ellipse cx="60" cy="30" rx="40" ry="18" fill="white" opacity="0.8"/>
  <ellipse cx="90" cy="25" rx="28" ry="14" fill="white" opacity="0.8"/>
  <ellipse cx="320" cy="20" rx="45" ry="20" fill="white" opacity="0.7"/>
  <ellipse cx="350" cy="16" rx="30" ry="14" fill="white" opacity="0.7"/>
  <!-- 지면 -->
  <rect x="0" y="188" width="400" height="52" fill="#8b7355"/>
  <rect x="0" y="185" width="400" height="6" fill="#a08050"/>
  <!-- 파편/잔해 (지면) -->
  <ellipse cx="200" cy="194" rx="160" ry="14" fill="#7a6040" opacity="0.6"/>
  <rect x="80" y="185" width="30" height="14" rx="2" fill="#9a8060" transform="rotate(-10 95 192)"/>
  <rect x="140" y="183" width="40" height="16" rx="2" fill="#8a7050" transform="rotate(5 160 191)"/>
  <rect x="230" y="184" width="35" height="14" rx="2" fill="#a09070" transform="rotate(-7 247 191)"/>
  <rect x="300" y="186" width="25" height="12" rx="2" fill="#948060" transform="rotate(12 312 192)"/>

  <!-- ===== 5층 건물 (오른쪽, 부분 붕괴) ===== -->
  <!-- 건물 본체 -->
  <rect x="220" y="45" width="160" height="143" rx="2" fill="#b0b8c8"/>
  <!-- 층 구분선 -->
  <line x1="220" y1="74" x2="380" y2="74" stroke="#9aa0b0" stroke-width="2"/>
  <line x1="220" y1="103" x2="380" y2="103" stroke="#9aa0b0" stroke-width="2"/>
  <line x1="220" y1="132" x2="380" y2="132" stroke="#9aa0b0" stroke-width="2"/>
  <line x1="220" y1="161" x2="380" y2="161" stroke="#9aa0b0" stroke-width="2"/>
  <!-- 창문들 -->
  <rect x="228" y="51" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="258" y="51" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="288" y="51" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="318" y="51" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="352" y="51" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="228" y="80" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="258" y="80" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="288" y="80" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="318" y="80" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="352" y="80" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="228" y="109" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="258" y="109" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="288" y="109" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="318" y="109" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="228" y="138" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="258" y="138" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="288" y="138" width="22" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.8"/>
  <!-- 건물 좌측 상단 붕괴 -->
  <polygon points="220,45 280,45 250,80 220,90" fill="#87ceeb"/>
  <polygon points="220,45 268,45 240,72 220,82" fill="#c5e8f7"/>
  <!-- 붕괴 단면 노출 -->
  <polygon points="220,50 265,50 238,75 220,84" fill="#9ca3af"/>
  <line x1="230" y1="52" x2="222" y2="72" stroke="#6b7280" stroke-width="2"/>
  <line x1="245" y1="50" x2="232" y2="70" stroke="#6b7280" stroke-width="2"/>
  <line x1="258" y1="50" x2="240" y2="68" stroke="#6b7280" stroke-width="2"/>
  <!-- 철근 노출 -->
  <line x1="225" y1="50" x2="218" y2="80" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="240" y1="50" x2="230" y2="75" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 먼지 구름 -->
  <circle cx="210" cy="100" r="45" fill="white" opacity="0.35"/>
  <circle cx="175" cy="85" r="35" fill="white" opacity="0.3"/>
  <circle cx="190" cy="120" r="30" fill="white" opacity="0.25"/>
  <circle cx="230" cy="75" r="25" fill="white" opacity="0.3"/>

  <!-- ===== 대형 굴착기 (좌측) ===== -->
  <!-- 무한궤도 -->
  <rect x="5" y="165" width="130" height="28" rx="10" fill="#1e293b"/>
  <circle cx="22" cy="179" r="12" fill="#334155"/>
  <circle cx="118" cy="179" r="12" fill="#334155"/>
  <rect x="22" y="167" width="96" height="24" fill="#334155"/>
  <circle cx="22" cy="179" r="6" fill="#64748b"/>
  <circle cx="118" cy="179" r="6" fill="#64748b"/>
  <circle cx="70" cy="174" r="4" fill="#475569"/>
  <circle cx="50" cy="174" r="4" fill="#475569"/>
  <circle cx="90" cy="174" r="4" fill="#475569"/>
  <!-- 본체 -->
  <rect x="18" y="130" width="110" height="38" rx="6" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
  <!-- 캐빈 -->
  <rect x="65" y="100" width="55" height="35" rx="4" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <rect x="70" y="104" width="42" height="22" rx="2" fill="#bfdbfe" stroke="#93c5fd" stroke-width="1"/>
  <!-- 굴착기 긴 팔 -->
  <line x1="40" y1="132" x2="168" y2="60" stroke="#374151" stroke-width="14" stroke-linecap="round"/>
  <line x1="168" y1="60" x2="218" y2="38" stroke="#374151" stroke-width="11" stroke-linecap="round"/>
  <!-- 버킷 (대형) -->
  <polygon points="210,26 232,24 238,50 208,52" fill="#6b7280" stroke="#374151" stroke-width="2"/>
  <line x1="214" y1="52" x2="210" y2="62" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <line x1="221" y1="52" x2="219" y2="63" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <line x1="229" y1="51" x2="228" y2="62" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <!-- 조인트 -->
  <circle cx="40" cy="132" r="10" fill="#374151"/>
  <circle cx="168" cy="60" r="8" fill="#374151"/>

  <!-- 텍스트 배너 -->
  <rect x="0" y="210" width="400" height="30" fill="rgba(28,92,48,0.9)"/>
  <text x="200" y="230" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">노후 건축물·주택·상가·공장 안전 해체</text>
</svg>

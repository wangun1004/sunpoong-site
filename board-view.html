<script>
const id = getParam('id');
if (!id) { location.href = 'board.html'; }

function catLabel(cat) {
  return { notice:'공지사항', project:'시공사례', news:'뉴스', qna:'Q&A' }[cat] || cat;
}

async function loadPost() {
  try {
    const post = await getPost(id);
    if (!post) { document.getElementById('postArea').innerHTML = '<p style="color:red">게시글을 찾을 수 없습니다.</p>'; return; }
    document.title = post.title + ' – 선풍건설산업';
    document.getElementById('postArea').innerHTML = `
      <div style="margin-bottom:8px;">
        <a href="board.html" style="font-size:13px; color:var(--gray);">공지/게시판</a>
        <span style="color:var(--gray); font-size:13px;"> &gt; ${catLabel(post.category)}</span>
      </div>
      <div class="post-header">
        ${post.is_notice ? '<span class="notice-badge" style="margin-right:8px">공지</span>' : ''}
        <h1 class="post-title">${post.title}</h1>
        <div class="post-meta">
          <span>작성자: ${post.author || '관리자'}</span>
          <span>작성일: ${formatDateTime(post.created_at)}</span>
          <span>조회: ${post.views || 0}</span>
        </div>
      </div>
      <div class="post-content">${post.content}</div>
    `;
  } catch(e) {
    document.getElementById('postArea').innerHTML = `<p style="color:red">오류: ${e.message}</p>`;
  }
}

loadPost();
</script>

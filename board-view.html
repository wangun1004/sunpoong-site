  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon">SP</div>
      <div class="logo-text"><div class="en">DEMOLITION</div><div class="kr">선풍건설산업</div></div>
    </a>
    <nav>
      <a href="index.html">HOME 홈</a>
      <a href="about.html">ABOUT US 회사소개</a>
      <a href="services.html">SERVICES 서비스</a>
      <a href="projects.html">PROJECTS 프로젝트</a>
      <a href="board.html" class="active">공지/게시판</a>
      <a href="demolition.html" class="btn-demo">해체계획서 작성</a>
      <a href="contact.html">CONTACT 문의하기</a>
    </nav>
    <button class="hamburger"><span></span><span></span><span></span></button>
  </div>
</header>

<section>
  <div class="section-inner" style="max-width:860px">
    <div id="postArea">
      <div style="text-align:center; padding:60px; color:var(--gray);">로딩 중...</div>
    </div>
    <div style="display:flex; justify-content:space-between; margin-top:24px;">
      <a href="board.html" style="display:inline-flex; align-items:center; gap:6px; background:var(--navy); color:#fff; padding:10px 24px; border-radius:10px; font-size:14px; font-weight:600;">← 목록으로</a>
      <a href="contact.html" class="btn-green" style="display:inline-flex; align-items:center; gap:6px; padding:10px 24px; border-radius:10px; font-size:14px; font-weight:600;">📞 견적 문의</a>
    </div>
  </div>
</section>

<footer id="footer">
  <div class="footer-inner">
    <div class="footer-top">
      <div class="footer-brand">
        <div class="footer-logo"><div class="footer-logo-icon">SP</div><div class="footer-logo-text"><div class="en">DEMOLITION</div><div class="kr">선풍건설산업</div></div></div>
        <p class="footer-desc">광주·전남 철거·해체 전문 기업</p>
      </div>
      <div class="footer-col"><h4>바로가기</h4><a href="about.html">회사소개</a><a href="services.html">서비스</a><a href="contact.html">문의하기</a></div>
      <div class="footer-col"><h4>연락처</h4><li>📞 015-125-9770</li></div>
    </div>
    <div class="footer-bottom"><div>© 2025 선풍건설산업. All rights reserved.</div></div>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/db.js"></script>
<script>
const id = getParam('id');
if (!id) { location.href = 'board.html'; }

function catLabel(cat) {
  return { notice:'공지사항', project:'시공사례', news:'뉴스', qna:'Q&A' }[cat] || cat;
}

async function loadPost() {
  try {
    const post = await getPost(id);
    if (!post) { document.getElementById('postArea').innerHTML = '<p style="color:red">게시글을 찾을 수 없습니다.</p>'; return; }
    document.title = post.title + ' – 선풍건설산업';
    document.getElementById('postArea').innerHTML = `
      <div style="margin-bottom:8px;">
        <a href="board.html" style="font-size:13px; color:var(--gray);">공지/게시판</a>
        <span style="color:var(--gray); font-size:13px;"> &gt; ${catLabel(post.category)}</span>
      </div>
      <div class="post-header">
        ${post.is_notice ? '<span class="notice-badge" style="margin-right:8px">공지</span>' : ''}
        <h1 class="post-title">${post.title}</h1>
        <div class="post-meta">
          <span>작성자: ${post.author || '관리자'}</span>
          <span>작성일: ${formatDateTime(post.created_at)}</span>
          <span>조회: ${post.views || 0}</span>
        </div>
      </div>
      <div class="post-content">${post.content}</div>
    `;
  } catch(e) {
    document.getElementById('postArea').innerHTML = `<p style="color:red">오류: ${e.message}</p>`;
  }
}

loadPost();
</script>
</body>
</html>
